<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/image.png" />

    <meta
      name="description"
      content="You are cordially invited to the wedding of Pushpendra & Renu. Join us for a cinematic celebration of love."
    />
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chacha-wedding.vercel.app/" />
    <meta property="og:title" content="Pushpendra & Renu's Wedding Invitation | आप सादर आमंत्रित हैं ✨" />
    <meta property="og:description" content="You are cordially invited to the wedding of Mr. Pushpendra & Renu. Click to view your personal cinematic invitation." />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="Pushpendra & Renu Wedding" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Pushpendra & Renu's Wedding Invitation" />
    <meta property="twitter:description" content="A cinematic experience to celebrate our union. We wait for your presence!" />
    <meta property="twitter:image" content="%PUBLIC_URL%/image.png" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <title>Wedding of Pushpendra & Renu</title>
    
    <style>
      body {
        margin: 0;
        background-color: #070203;
      }
      /* Initial loader styling for a smoother first paint */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #070203;
        z-index: 9999;
      }
      .loader-mandala {
        width: 60px;
        height: 60px;
        border: 2px solid rgba(255, 215, 0, 0.1);
        border-top: 2px solid #FFD700;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root">
      <!-- Minimalist static loader while React mounts -->
      <div id="initial-loader">
        <div class="loader-mandala"></div>
      </div>
    </div>
  </body>
</html>
